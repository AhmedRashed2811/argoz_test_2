<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account Suspended</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:#fff7f0;color:#3a2c1d}
    .card{max-width:440px;text-align:center;padding:48px 40px;background:#fff;
      border:1px solid #f0d9c2;border-radius:16px;box-shadow:0 10px 40px rgba(224,123,32,.08)}
    .badge{width:64px;height:64px;border-radius:50%;background:#fdeede;margin:0 auto 20px;
      display:flex;align-items:center;justify-content:center}
    h1{font-size:22px;margin:0 0 10px}
    p{color:#7a6a58;line-height:1.6;margin:0}
    strong{color:#e07b20}
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#e07b20"
        stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Access suspended</h1>
    <p><strong>{{ tenant.name }}</strong>'s subscription is currently inactive.
       Your data is safe and untouched. Please contact your administrator to
       reactivate access.</p>
  </div>
</body>
</html>
