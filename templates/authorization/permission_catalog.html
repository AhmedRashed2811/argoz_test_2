{% extends "base.html" %}
{% block title %}Permission Catalog · Argoz CRM{% endblock %}
{% block content %}
  <h1>Permission Catalog</h1>
  <table border="1">
    <thead><tr><th>Name</th><th>Code</th><th>Module</th><th>Risk</th></tr></thead>
    <tbody>
      {% for p in permissions %}
        <tr><td>{{ p.name }}</td><td><code>{{ p.code }}</code></td><td>{{ p.module }}</td><td>{{ p.risk_level }}</td></tr>
      {% empty %}
        <tr><td colspan="4">No permissions defined.</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
